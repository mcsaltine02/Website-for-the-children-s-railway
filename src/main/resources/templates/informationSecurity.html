<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
          th:href="@{${@environment.getProperty('image.favicon')}}"
          type="image/png">
    <title>Все документы</title>
    <link th:href="@{css/header.css}" rel="stylesheet">
    <link th:href="@{css/footer.css}" rel="stylesheet">
    <link th:href="@{css/informationSecurity_PDF.css}" rel="stylesheet">


    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

</head>
<body>
<header th:insert="~{fragment :: header}"></header>

<main>
    <!-- Вертикальная шкала слева -->
    <div class="scroll-progress">
        <div class="progress-line"></div>
        <div class="progress-dots">
            <div class="dot active" data-target="#section-1" title="Обучающимся"></div>
            <div class="dot" data-target="#section-2" title="Педагогам"></div>
            <div class="dot" data-target="#section-3" title="Родителям"></div>
            <div class="dot" data-target="#section-4" title="Нормативное регулирование"></div>
            <div class="dot" data-target="#section-5" title="Детские безопасные сайты"></div>
        </div>
    </div>
<!--    <script src="js/dot-scroll.js"></script>-->

    <div th:each="cat, stat : ${categories}" class="section" th:id="'section-' + ${stat.index + 1}">
        <h1 th:text="${cat.name}">Категория</h1>

        <!-- Динамический фрагмент -->
        <div class="extra-content"
             th:insert="${cat.fragmentName} :: content"
             th:remove="tag">
        </div>

        <!-- PDF блоки -->
        <div th:if="${!cat.files.isEmpty()}">
            <div class="pdf-container">
                <div th:each="file, iter : ${cat.files}" class="pdf-block-wrapper">

                    <div class="pdf-block"
                         th:id="'block-' + ${stat.index} + '-' + ${iter.index}"
                         th:data-pdf-url="@{'/pdfs/' + ${cat.folder} + '/' + ${file}}"
                         th:data-canvas-id="'canvas-' + ${stat.index} + '-' + ${iter.index}"
                         th:data-error-id="'error-' + ${stat.index} + '-' + ${iter.index}"
                         style="cursor: pointer;">

                        <canvas th:id="'canvas-' + ${stat.index} + '-' + ${iter.index}"></canvas>

                        <h4 th:text="${file}" class="name">Название.pdf</h4>

                        <!-- Иконка скачивания -->
                        <a th:href="@{'/pdfs/' + ${cat.folder} + '/' + ${file}}"
                           th:download="${file}"
                           class="download-icon"
                           title="Скачать PDF"
                           onclick="event.stopPropagation();">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 15L12 3M12 15L8 11M12 15L16 11M19 21H5"
                                      stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>

                        <p th:id="'error-' + ${stat.index} + '-' + ${iter.index}" class="error"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:insert="~{fragment :: footer}"></footer>

<!--отображение ПДФ-->
<script th:inline="javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';

    // === Настройки ===
    const MAX_CONCURRENT = 1;           // сколько PDF можно рендерить одновременно
    const RENDER_QUEUE = [];
    let activeRenders = 0;

    // Основная функция рендеринга
    function renderPDF(canvasId, pdfUrl, errorId) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const task = {
            canvasId,
            pdfUrl,
            errorId,
            execute: () => performRender(canvasId, pdfUrl, errorId)
        };

        RENDER_QUEUE.push(task);
        processQueue();
    }

    // Реальная функция рендеринга
    async function performRender(canvasId, pdfUrl, errorId) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        try {
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdfDoc = await loadingTask.promise;
            const page = await pdfDoc.getPage(1);

            const scale = 0.32;
            const viewport = page.getViewport({ scale });

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            const container = canvas.closest('.pdf-block');
            const h4 = container ? container.querySelector('h4.name') : null;
            if (h4) h4.style.maxWidth = viewport.width + 'px';

            const ctx = canvas.getContext("2d", { alpha: false });
            await page.render({ canvasContext: ctx, viewport }).promise;

            console.log(`✓ Отрендерено: ${pdfUrl}`);
        } catch (err) {
            console.error(`Ошибка ${pdfUrl}:`, err);
            const errorEl = document.getElementById(errorId);
            if (errorEl) {
                errorEl.textContent = "Не удалось загрузить";
                errorEl.style.display = "block";
            }
        } finally {
            activeRenders--;
            processQueue(); // запускаем следующую задачу
        }
    }

    // Обработка очереди
    function processQueue() {
        while (RENDER_QUEUE.length > 0 && activeRenders < MAX_CONCURRENT) {
            const task = RENDER_QUEUE.shift();
            activeRenders++;
            task.execute();
        }
    }

    // === Lazy Loading с очередью ===
    function initLazyPDFLoading() {
        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const block = entry.target;

                    const canvasId = block.dataset.canvasId;
                    const pdfUrl = block.dataset.pdfUrl;
                    const errorId = block.dataset.errorId;

                    if (canvasId && pdfUrl) {
                        renderPDF(canvasId, pdfUrl, errorId);
                        obs.unobserve(block);
                    }
                }
            });
        }, {
            rootMargin: "400px 0px",
            threshold: 0.1
        });

        document.querySelectorAll('.pdf-block').forEach(block => {
            observer.observe(block);
        });
    }

    // Запуск
    document.addEventListener('DOMContentLoaded', initLazyPDFLoading);
</script>

<!-- обработка клика по ПДФ для его открытия -->
<script th:inline="javascript">
    // Обработчик клика по всему блоку PDF
    document.querySelectorAll('.pdf-block').forEach(block => {
        block.addEventListener('click', function (e) {
            // Если кликнули по иконке скачивания — не открываем
            if (e.target.closest('.download-icon')) {
                return;
            }

            const url = this.dataset.pdfUrl;
            if (url) {
                window.open(url, '_blank');
            }
        });
    });
</script>
<script th:src="@{js/main.js}" defer></script>
</body>
</html>

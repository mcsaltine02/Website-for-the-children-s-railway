<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Питание в предприятии</title>
    <link th:href="@{/css/root.css}" rel="stylesheet">
    <link th:href="@{/css/header.css}" rel="stylesheet">
    <link th:href="@{/css/main_info_about_organization/vacant-places.css}" rel="stylesheet">
    <link th:href="@{/css/footer.css}" rel="stylesheet">

    <script defer th:src="@{/js/main.js}"></script>

</head>

<body>

<header th:insert="~{fragment :: header}"></header>

<main>

<div data-th-each="tp : ${taughtPrograms}">
    <p class="start-name">
        По специальность:
        <span data-th-text="${tp.qualifications}" class="name"></span>
    </p>
    <p class="start-vacant-places">
        кол-во вакантных мест -
        <span data-th-text="${tp.vacantPlaces}" class="vacant-place"></span>
    </p>
    <form data-th-action="@{/main-info-about-organization/vacant-places}"
          method="post"
          sec:authorize="hasRole('ADMIN')">
        <label class="form-label">Изменить кол-во вакантных мест:</label>
        <input
                type="number"
                name="vacantPlaces"
                class="form-control" min="0">
        <input type="hidden" name="tpId" th:value="${tp.tpId}">
        <button type="submit">Сохранить</button>
    </form>
</div>

</main>

<footer th:insert="~{fragment :: footer}"></footer>

</body>

</html>

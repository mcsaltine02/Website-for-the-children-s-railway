<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Создание нового сотрудника</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link th:href="@{/css/root.css}" rel="stylesheet">
    <link th:href="@{/css/header.css}" rel="stylesheet">
    <link th:href="@{/css/main_info_about_organization/teachers/addTeacher.css}" rel="stylesheet">
    <link th:href="@{/css/footer.css}" rel="stylesheet">
</head>
<body>

<header th:insert="~{fragment :: header}"></header>

<div class="container mt-5">
    <h2 class="mb-4 name-container">Создание нового сотрудника</h2>

    <form th:action="@{/teachers/create}" th:object="${createTeacher}" method="post" enctype="multipart/form-data">

        <!-- Основная информация -->
        <div class="row g-3 now-place">
            <div class="col-md-4 ">
                <label class="form-label">Имя</label>
                <input type="text" class="form-control" th:field="*{firstName}" required>
            </div>
            <div class="col-md-4 ">
                <label class="form-label">Фамилия</label>
                <input type="text" class="form-control" th:field="*{lastName}" required>
            </div>
            <div class="col-md-4 ">
                <label class="form-label">Отчество</label>
                <input type="text" class="form-control" th:field="*{middleName}">
            </div>

            <div class="row g-3 mt-3">
                <div class="col-md-6 ">
                    <label class="form-label">Общий стаж работы (лет)</label>
                    <input
                            type="number"
                            name="workExperience"
                            class="form-control" min="0">
                </div>
                <div class="col-md-6 ">
                    <label class="form-label">Стаж в образовательном учреждении (лет)</label>
                    <input
                            type="number"
                           name="workExperienceInEducationalInstitution"
                           class="form-control" min="0">
                </div>
            </div>
        </div>


        <!-- Фото при создании -->

        <div class="now-place">
            <label class="form-label">Загрузить фотографию</label>
            <input type="file"
                   name="newPhoto"
                   accept="image/jpeg,image/png,image/jpg,image/webp"
                   class="form-control ">
        </div>

        <!-- ManyToOne поля -->
        <div class="mt-4 now-place">
            <label class="form-label">Учёная степень</label>
            <div class="input-group">
                <select class="form-select" th:field="*{academicDegreeId}">
                    <option value="">— Выберите существующую —</option>
                    <option th:each="deg : ${academicDegrees}"
                            th:value="${deg.adId}"
                            th:text="${deg.academic}"></option>
                </select>
                <input type="text" class="form-control" th:field="*{newAcademicDegree}"
                       placeholder="Или введите новую учёную степень">
            </div>
        </div>

        <div class="mt-3 now-place">
            <label class="form-label">Должность</label>
            <div class="input-group">
                <select class="form-select" th:field="*{postId}">
                    <option value="">— Выберите существующую —</option>
                    <option th:each="p : ${posts}"
                            th:value="${p.pId}"
                            th:text="${p.post}"></option>
                </select>
                <input type="text" class="form-control" th:field="*{newPost}"
                       placeholder="Или введите новую должность">
            </div>
        </div>

        <div class="mt-3 now-place">
            <label class="form-label">Условие привлечения</label>
            <div class="input-group">
                <select class="form-select" th:field="*{attractionConditionId}">
                    <option value="">— Выберите существующее —</option>
                    <option th:each="cond : ${attractionConditions}"
                            th:value="${cond.acId}"
                            th:text="${cond.condition}"></option>
                </select>
                <input type="text" class="form-control" th:field="*{newAttractionCondition}"
                       placeholder="Или введите новое условие">
            </div>
        </div>

        <!-- Уровни образования (полностью динамические) -->
        <div class="now-place">
            <label class="section-title">Уровни образования</label>
            <div id="educationLevelsContainer">
                <div class="input-group dynamic-row">
                    <input type="text" class="form-control" name="newEducationLevels[0]"
                           placeholder="Например: Высшее образование (магистр)">
                    <button type="button" class="btn btn-danger remove-row">Удалить</button>
                </div>
            </div>
            <button type="button" id="addEducationLevel" class="btn btn-success mt-2">+ Добавить уровень образования
            </button>
        </div>

        <!-- Повышение квалификации -->
        <div class="now-place">
            <label class="section-title mt-4">Повышение квалификации</label>
            <div id="profDevContainer">
                <div class="input-group dynamic-row">
                    <input type="text" class="form-control" name="professionalDevelopments[0]"
                           placeholder="Название курса, семинара или повышения">
                    <button type="button" class="btn btn-danger remove-row">Удалить</button>
                </div>
            </div>
            <button type="button" id="addProfDev" class="btn btn-success mt-2">+ Добавить повышение квалификации
            </button>
        </div>

        <!-- Профессиональная переподготовка -->
        <div class="now-place">
            <label class="section-title mt-4">Профессиональная переподготовка</label>
            <div id="profRetrainContainer">
                <div class="input-group dynamic-row">
                    <input type="text" class="form-control" name="professionalRetraining[0]"
                           placeholder="Название программы переподготовки">
                    <button type="button" class="btn btn-danger remove-row">Удалить</button>
                </div>
            </div>
            <button type="button" id="addProfRetrain" class="btn btn-success mt-2">+ Добавить переподготовку</button>
        </div>


        <div class="now-place">
            <label class="section-title mt-4">Преподаваемые программы</label>
            <div class="mb-3">
                <p class="text-muted mb-2">Выберите уже существующие программы:</p>
                <div th:each="prog : ${taughtPrograms}">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               th:field="*{taughtProgramIds}"
                               th:value="${prog.tpId}">
                        <label class="form-check-label" th:text="${prog.qualifications}"></label>
                    </div>
                </div>
            </div>
            <!-- Блок для добавления новых программ -->
            <div id="newTaughtProgramsContainer">
                <div class="input-group dynamic-row">
                    <input type="text" class="form-control" name="newTaughtPrograms[0]"
                           placeholder="Введите новую преподаваемую программу">
                    <button type="button" class="btn btn-danger remove-row">Удалить</button>
                </div>
            </div>
            <button type="button" id="addTaughtProgram" class="btn btn-success mt-2">+ Добавить новую программу</button>
        </div>


        <div class="mt-5">
            <button type="submit" class="btn btn-primary btn-lg">Создать сотрудника</button>
            <a th:href="@{/teachers}" class="btn btn-secondary btn-lg ms-3">Отмена</a>
        </div>
    </form>
</div>

<script>
    $(document).ready(function() {
        let educationIndex = 1;
        let profDevIndex = 1;
        let profRetrainIndex = 1;
        let taughtProgramIndex = 1;

        // Добавление уровня образования
        $('#addEducationLevel').click(function() {
            let html = `
            <div class="input-group dynamic-row">
                <input type="text" class="form-control" name="newEducationLevels[${educationIndex}]"
                       placeholder="Введите уровень образования">
                <button type="button" class="btn btn-danger remove-row">Удалить</button>
            </div>`;
            $('#educationLevelsContainer').append(html);
            educationIndex++;
        });

        // Добавление повышения квалификации
        $('#addProfDev').click(function() {
            let html = `
            <div class="input-group dynamic-row">
                <input type="text" class="form-control" name="professionalDevelopments[${profDevIndex}]"
                       placeholder="Название курса / мероприятия">
                <button type="button" class="btn btn-danger remove-row">Удалить</button>
            </div>`;
            $('#profDevContainer').append(html);
            profDevIndex++;
        });

        // Добавление переподготовки
        $('#addProfRetrain').click(function() {
            let html = `
            <div class="input-group dynamic-row">
                <input type="text" class="form-control" name="professionalRetraining[${profRetrainIndex}]"
                       placeholder="Название программы переподготовки">
                <button type="button" class="btn btn-danger remove-row">Удалить</button>
            </div>`;
            $('#profRetrainContainer').append(html);
            profRetrainIndex++;
        });

        // Добавление новой преподаваемой программы
        $('#addTaughtProgram').click(function() {
            let html = `
            <div class="input-group dynamic-row">
                <input type="text" class="form-control" name="newTaughtPrograms[${taughtProgramIndex}]"
                       placeholder="Введите новую преподаваемую программу">
                <button type="button" class="btn btn-danger remove-row">Удалить</button>
            </div>`;
            $('#newTaughtProgramsContainer').append(html);
            taughtProgramIndex++;
        });

        // Удаление любой динамической строки
        $(document).on('click', '.remove-row', function() {
            $(this).closest('.dynamic-row').remove();
        });
    });
</script>
</body>
</html>

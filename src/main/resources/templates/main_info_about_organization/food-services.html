<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Питание в предприятии</title>
    <link th:href="@{/css/root.css}" rel="stylesheet">
    <link th:href="@{/css/header.css}" rel="stylesheet">
    <link th:href="@{/css/main_info_about_organization/food-services.css}" rel="stylesheet">
    <link th:href="@{/css/footer.css}" rel="stylesheet">

    <script defer th:src="@{/js/main.js}"></script>

</head>

<body>

<header th:insert="~{fragment :: header}"></header>

<main>
    <form sec:authorize="hasRole('ADMIN')"
          th:action="@{/main-info-about-organization/food}"
          method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".xlsx" required>
        <button type="submit">Обновить меню</button>
    </form>

    <div th:if="${message}" style="color:green;" th:text="${message}"></div>
    <div th:if="${error}" style="color:red;" th:text="${error}"></div>

    <div th:if="${filename}">
        <p>Дата последнего обновления меню питания: <strong th:text="${filename}"></strong></p>
        <h2><a th:href="${downloadUrl}" download class="download">Скачать меню питания</a></h2>
    </div>

    <div data-th-if="${filename == null}">
        <h1>Информация о питании в предприятии временно отсутствует</h1>
        <p>Простите за неудобство.</p>
    </div>

    <p class="place-text-phone-number">По всем вопросам вы можете обращаться по номеру:
        <span data-th-text="${numberPhone}">номер телефона</span>
    </p>

</main>

<footer th:insert="~{fragment :: footer}"></footer>

</body>

</html>

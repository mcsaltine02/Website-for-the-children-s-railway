
<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon"
          th:href="@{${@environment.getProperty('image.favicon')}}"
          type="image/png">
    <title>Document</title>
    <link th:href="@{/css/header.css}" rel="stylesheet">
    <link th:href="@{/css/footer.css}" rel="stylesheet">
    <link th:href="@{/css/passengers.css}" rel="stylesheet">
</head>

<body>


<header th:insert="~{fragment :: header}"></header>

<div class="scroll-progress">
    <div class="progress-dots">
        <span class="dot" data-target="#prices"></span>
        <span class="dot dot-timetable" data-target="#timetable"></span>
        <span class="dot dot-iksweb" data-target="#iksweb"></span>
        <span class="dot" data-target="#img_shema"></span>
    </div>
</div>
<!--<script src="js/dot-scroll.js"></script>-->

<div style="margin-top: 50px;" class="body-wraper">

    <main >
        <table class="prices section" id="prices">
            <tr>
                <td colspan="2">
                    <h1 class="prices_name">Цены</h1>
                </td>
            </tr>
            <tr>
                <td>
                    <h3>Взрослый</h3>
                </td>
                <td>
                    <h3>Детский</h3>
                </td>
            </tr>
            <tr>
                <td>300₽</td>
                <td>250₽</td>
            </tr>
            <tr>
                <td colspan="2" class="price_free">
                    <h3>Дети до 5 лет, дети-инвалиды при предоставлении справки МСЭ - бесплатно</h3>
                </td>
            </tr>
        </table>

        <div class="container">

            <!-- КРАТКИЙ ВИД -->
            <div id="short-view">
                <div id="current-section">
                    <h2>Текущее положение поезда</h2>
                    <table class="current-train" id="currentTable">
                        <tbody></tbody>
                    </table>
                </div>

                <div id="next-section">
                    <h2 id="next-title">Расписание следующего отбытия</h2>
                    <table class="next-schedule" id="nextTable">
                        <thead>
                        <tr>
                            <th>Солнечная</th>
                            <th>Вити Черевичкина</th>
                            <th>Победа</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <button id="btnDetails" class="btn-primary">Подробнее</button>
            </div>

            <!-- ПОЛНОЕ РАСПИСАНИЕ -->
            <div id="full-view" style="display: none;">
                <h2>Расписание</h2>
                <table class="full-schedule" id="fullTable">
                    <thead>
                    <tr>
                        <th>Солнечная</th>
                        <th>Вити Черевичкина</th>
                        <th>Победа</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <button id="btnBack" class="btn-secondary">Краткая информация</button>
            </div>
        </div>

        <!-- Картинка со станциями -->
        <div class="map-wrapper" style="position: relative; display: inline-block; max-width: 100%;">
            <img id="routeMap" src="/images/схема.WebP" alt="Схема" style="width: 100%; height: auto;">

            <!-- SVG overlay -->
            <svg id="stationOverlay" width="100%" height="100%" style="position: absolute; top: 0; left: 0;">
                <circle cx="30%" cy="84%" r="35" opacity="0" data-station="solar" class="station-point"></circle>
                <circle cx="28%" cy="41%" r="35" opacity="0" data-station="viti" class="station-point"></circle>
                <circle cx="80%" cy="14%" r="35" opacity="0" data-station="pobeda" class="station-point"></circle>
            </svg>
        </div>

        <!-- Модальное окно -->
        <div id="stationModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalStationName"></h2>
                <div id="modalSchedule" class="modal-schedule"></div>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script th:src="@{/js/schedule.js}"></script>
    </main>


</div>


<footer th:insert="~{fragment :: footer}"></footer>

<script th:src="@{/js/main.js}" defer></script>
</body>

</html>

spring.datasource.url=jdbc:h2:file:/data/railwaydb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
#spring.sql.init.data-locations=classpath:data.sql

# H2 Console
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect


spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=true
spring.thymeleaf.check-template-location=false




spring.web.resources.add-mappings=true
spring.mvc.static-path-pattern=/**


spring.http.multipart.enabled = true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.admin.username=${ADMIN_NAME:MainTrain}
app.admin.password=${ADMIN_PASSWORD}

app.upload.food.dir=/data/uploads/food-services

app.number-phone=+7 (863) 251-27-04



logging.level.org.springframework.web=info


